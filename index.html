<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="一个关于母女关系与NPD特征的匿名自测工具。结果仅在本地页面计算，不保存、不上传。">
  <title>测一测：你的妈妈是NPD吗？</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell" aria-live="polite">
    <section class="hero-panel">
      <div class="brand-row">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>匿名自测</span>
      </div>
      <h1>测一测：你的妈妈是NPD吗？</h1>
      <p>
        这不是诊断，也不会替任何人贴标签。它只是帮你把那些说不清的压抑、内疚和小心翼翼，
        放到一个更清晰的位置上看一看。
      </p>
      <div class="privacy-note">
        不登录、不收集姓名、不上传答案、不保存结果。
      </div>
    </section>

    <section class="quiz-panel" aria-label="自测区域">
      <div class="progress-wrap" id="progressWrap" hidden>
        <div class="progress-meta">
          <span id="progressLabel">第 1 题</span>
          <span id="progressCount">1 / 12</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="card" id="card"></div>
    </section>
  </main>

  <template id="introTemplate">
    <div class="intro">
      <div class="soft-icon" aria-hidden="true">。</div>
      <h2>先确认一件事：你的感受值得被认真对待</h2>
      <p>
        有些感受，你可能压了很久。不是因为它不重要，而是你一直不确定：
        是不是自己太敏感了？
      </p>
      <p>
        下面 12 个问题没有标准答案。请按照你真实经历里的频率来选。
      </p>
      <div class="notice">
        本测试仅供自我觉察参考，不构成心理诊断。如你正处在严重焦虑、抑郁、自伤风险或现实危险中，请优先联系专业人士或当地紧急支持。
      </div>
      <button class="primary-btn" type="button" data-action="start">开始自测</button>
    </div>
  </template>

  <template id="questionTemplate">
    <div>
      <p class="question-kicker" id="questionKicker"></p>
      <h2 class="question-title" id="questionTitle"></h2>
      <div class="options" id="options"></div>
      <div class="nav-row">
        <button class="secondary-btn icon-btn" type="button" data-action="back" aria-label="上一题">←</button>
        <button class="primary-btn" type="button" data-action="next" disabled>下一题</button>
      </div>
    </div>
  </template>

  <template id="pauseTemplate">
    <div class="pause">
      <div class="soft-icon" aria-hidden="true">··</div>
      <h2>停一下，呼吸一口气</h2>
      <p id="pauseText"></p>
    </div>
  </template>

  <template id="bufferTemplate">
    <div class="intro">
      <div class="soft-icon" aria-hidden="true">。</div>
      <h2>你已经回答完所有问题</h2>
      <p>
        在看结果之前，先把身体放松一下。不管接下来看到什么，都不会改变一件事：
        你的感受是真实的。
      </p>
      <button class="primary-btn" type="button" data-action="result">查看我的结果</button>
    </div>
  </template>

  <template id="resultTemplate">
    <div class="result">
      <p class="result-level" id="resultLevel"></p>
      <h2 id="resultTitle"></h2>
      <p class="score-line" id="scoreLine"></p>
      <div class="result-copy" id="resultCopy"></div>
      <div class="notice">
        这份测试不能定义一段关系，也不能替代专业评估。它能做的是帮你看见模式，并提醒你：不舒服的感受不需要靠标签来证明。
      </div>
      <div class="result-actions">
        <a class="primary-btn link-btn" href="https://example.com" target="_blank" rel="noopener" id="guideLink">
          查看后续指南
        </a>
        <button class="secondary-btn" type="button" data-action="restart">重新测试</button>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
