<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="一个关于母女关系与NPD特征的自我觉察测试。你的回答属于你的隐私，页面不会收集个人信息。">
  <title>测一测：你的妈妈是NPD吗？</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell" id="appShell" aria-live="polite">
    <section class="quiz-panel" id="quiz" aria-label="自测区域">
      <div class="progress-wrap" id="progressWrap" hidden>
        <div class="progress-meta">
          <span id="progressLabel">第 1 题</span>
          <span id="progressCount">1 / 20</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="card" id="card"></div>
      <footer class="site-footer">
        <p>正版渠道仅限 <strong>小红书店铺「Jsence情绪治愈小屋」</strong></p>
        <p>未经许可不得搬运、转售或商用；发现侵权将追究责任。</p>
      </footer>
    </section>
  </main>

  <template id="welcomeTemplate">
    <div class="intro step-screen">
      <div class="brand-row">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>匿名自测</span>
      </div>
      <div class="cover-visual" aria-hidden="true">
        <span></span>
      </div>
      <h1>测一测：你的妈妈是NPD吗？</h1>
      <p>
        如果你总是在关系里怀疑自己，也许可以先从这 20 个问题开始，看见那些被你压下去的感受。
      </p>
      <button class="primary-btn" type="button" data-action="intro-next">继续</button>
    </div>
  </template>

  <template id="methodTemplate">
    <div class="intro step-screen">
      <div class="soft-icon" aria-hidden="true">。</div>
      <p class="step-kicker">开始前，知道这三件事就够了</p>
      <h2>这是一份自我觉察测试</h2>
      <div class="info-pills">
        <div class="info-card">
          <div class="info-visual privacy-visual" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <strong>隐私</strong>
            <span>你的回答只在当前页面里计算，不会上传到后台。页面不要求填写姓名、微信或联系方式，也不会记录你的测试答案。</span>
          </div>
        </div>
        <div class="info-card">
          <div class="info-visual basis-visual" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <strong>依据</strong>
            <span>题目参考 DSM-5 中对自恋型人格特质的描述，并结合母女关系中的高频场景改写。它不是临床诊断，而是帮助你整理关系模式的自我觉察工具。</span>
          </div>
        </div>
        <div class="info-card">
          <div class="info-visual score-visual" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <strong>计分</strong>
            <span>一共 20 题，总分 40 分。分数会落在轻度、中度或高度感知三个区间，帮助你理解这些模式出现的密度和影响。</span>
          </div>
        </div>
      </div>
      <div class="step-actions">
        <button class="secondary-btn" type="button" data-action="intro-back">返回</button>
        <button class="primary-btn" type="button" data-action="start">开始自测</button>
      </div>
    </div>
  </template>

  <template id="introTemplate">
    <div class="intro step-screen">
      <div class="soft-icon" aria-hidden="true">。</div>
      <h2>你的感受值得被认真对待</h2>
      <p>下面 20 个问题没有标准答案。请按照你真实经历里的频率来选。</p>
      <button class="primary-btn" type="button" data-action="start">开始自测</button>
    </div>
  </template>

  <template id="questionTemplate">
    <div>
      <p class="question-kicker" id="questionKicker"></p>
      <h2 class="question-title" id="questionTitle"></h2>
      <div class="options" id="options"></div>
      <div class="nav-row">
        <button class="secondary-btn icon-btn" type="button" data-action="back" aria-label="上一题">←</button>
        <button class="primary-btn" type="button" data-action="next" disabled>下一题</button>
      </div>
    </div>
  </template>

  <template id="pauseTemplate">
    <div class="pause">
      <div class="mini-visual breath-visual" aria-hidden="true">
        <span></span>
      </div>
      <h2>停一下，呼吸一口气</h2>
      <p id="pauseText"></p>
    </div>
  </template>

  <template id="bufferTemplate">
    <div class="intro">
      <div class="mini-visual result-visual" aria-hidden="true">
        <span></span>
      </div>
      <h2>你已经回答完所有问题</h2>
      <p>
        在看结果之前，先把身体放松一下。不管接下来看到什么，都不会改变一件事：
        你的感受是真实的。
      </p>
      <button class="primary-btn" type="button" data-action="result">查看我的结果</button>
    </div>
  </template>

  <template id="resultTemplate">
    <div class="result">
      <div class="result-hero" id="resultHero">
        <div class="result-avatar" id="resultAvatar" aria-hidden="true">
          <span></span>
        </div>
        <div class="result-summary">
          <p class="result-level" id="resultLevel"></p>
          <h2 id="resultTitle"></h2>
          <p class="score-line" id="scoreLine"></p>
          <p class="result-tagline" id="resultTagline"></p>
        </div>
      </div>
      <div class="result-copy" id="resultCopy"></div>
      <div class="score-guide">
        <h3>分数怎么看</h3>
        <div id="scoreBands"></div>
      </div>
      <div class="notice">
        这份测试不能定义一段关系，也不能替代专业评估。它能做的是帮你看见模式，并提醒你：不舒服的感受不需要靠标签来证明。
      </div>
      <div class="result-actions">
        <button class="primary-btn" type="button" data-action="guide">
          查看后续指南
        </button>
        <button class="secondary-btn" type="button" data-action="restart">重新测试</button>
      </div>
    </div>
  </template>

  <template id="guideTemplate">
    <div class="guide-panel">
      <div class="guide-card">
        <button class="close-btn" type="button" data-action="close-guide" aria-label="关闭">×</button>
        <p class="result-level">后续指南</p>
        <h2>如果你想继续往前走</h2>
        <p>
          后续指南包含关系模式拆解、边界练习和常见话术。请回到小红书店铺「Jsence情绪治愈小屋」，联系店家咨询领取方式。
        </p>
        <p class="guide-hint">
          你也可以截图当前结果，发送给店家，方便获得更适合你的指南建议。非该店铺渠道均非官方授权，请注意辨别。
        </p>
        <button class="primary-btn" type="button" data-action="close-guide">我知道了</button>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
