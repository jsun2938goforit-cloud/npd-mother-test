<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="一个关于母女关系与NPD特征的自我觉察测试。你的回答属于你的隐私，页面不会收集个人信息。">
  <title>测一测：你的妈妈是NPD吗？</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell" aria-live="polite">
    <section class="hero-panel">
      <div class="brand-row">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>匿名自测</span>
      </div>
      <h1>测一测：你的妈妈是NPD吗？</h1>
      <p>
        这不是诊断，也不会替任何人贴标签。它只是帮你把那些说不清的压抑、内疚和小心翼翼，
        放到一个更清晰的位置上看一看。
      </p>
      <div class="privacy-note">
        <strong>请放心作答：</strong>你的回答属于你的隐私。我们不会收集你的个人信息，也不会记录你的测试答案。
        <br><br>
        <strong>题目依据：</strong>这套题参考了自恋型人格特质中常见的共情困难、权利感、过度需要认可、关系利用、对批评敏感等维度，并结合亲子关系里的情绪勒索、边界侵犯和角色倒置体验设计。
      </div>
    </section>

    <section class="quiz-panel" aria-label="自测区域">
      <div class="progress-wrap" id="progressWrap" hidden>
        <div class="progress-meta">
          <span id="progressLabel">第 1 题</span>
          <span id="progressCount">1 / 12</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="card" id="card"></div>
    </section>
  </main>

  <template id="introTemplate">
    <div class="intro">
      <div class="soft-icon" aria-hidden="true">。</div>
      <h2>先确认一件事：你的感受值得被认真对待</h2>
      <p>
        有些感受，你可能压了很久。不是因为它不重要，而是你一直不确定：
        是不是自己太敏感了？
      </p>
      <p>
        下面 12 个问题没有标准答案。请按照你真实经历里的频率来选。
      </p>
      <div class="notice">
        本测试仅供自我觉察参考，不构成心理诊断。它不是临床量表，也不能判断任何人是否患有 NPD。每题按「经常这样」2 分、「偶尔这样」1 分、「几乎没有」0 分计算，总分 24 分。
      </div>
      <button class="primary-btn" type="button" data-action="start">开始自测</button>
    </div>
  </template>

  <template id="questionTemplate">
    <div>
      <p class="question-kicker" id="questionKicker"></p>
      <h2 class="question-title" id="questionTitle"></h2>
      <div class="options" id="options"></div>
      <div class="nav-row">
        <button class="secondary-btn icon-btn" type="button" data-action="back" aria-label="上一题">←</button>
        <button class="primary-btn" type="button" data-action="next" disabled>下一题</button>
      </div>
    </div>
  </template>

  <template id="pauseTemplate">
    <div class="pause">
      <div class="soft-icon" aria-hidden="true">··</div>
      <h2>停一下，呼吸一口气</h2>
      <p id="pauseText"></p>
    </div>
  </template>

  <template id="bufferTemplate">
    <div class="intro">
      <div class="soft-icon" aria-hidden="true">。</div>
      <h2>你已经回答完所有问题</h2>
      <p>
        在看结果之前，先把身体放松一下。不管接下来看到什么，都不会改变一件事：
        你的感受是真实的。
      </p>
      <button class="primary-btn" type="button" data-action="result">查看我的结果</button>
    </div>
  </template>

  <template id="resultTemplate">
    <div class="result">
      <p class="result-level" id="resultLevel"></p>
      <h2 id="resultTitle"></h2>
      <p class="score-line" id="scoreLine"></p>
      <div class="result-copy" id="resultCopy"></div>
      <div class="score-guide">
        <h3>分数怎么看</h3>
        <div id="scoreBands"></div>
      </div>
      <div class="notice">
        这份测试不能定义一段关系，也不能替代专业评估。它能做的是帮你看见模式，并提醒你：不舒服的感受不需要靠标签来证明。
      </div>
      <div class="result-actions">
        <button class="primary-btn" type="button" data-action="guide">
          查看后续指南
        </button>
        <button class="secondary-btn" type="button" data-action="restart">重新测试</button>
      </div>
    </div>
  </template>

  <template id="guideTemplate">
    <div class="guide-panel">
      <div class="guide-card">
        <button class="close-btn" type="button" data-action="close-guide" aria-label="关闭">×</button>
        <p class="result-level">后续指南</p>
        <h2>如果你想继续往前走</h2>
        <p>
          后续指南包含关系模式拆解、边界练习和常见话术。请回到你购买或看到本测试的店铺页面，联系店家咨询领取方式。
        </p>
        <p class="guide-hint">
          你也可以截图当前结果，发送给店家，方便获得更适合你的指南建议。
        </p>
        <button class="primary-btn" type="button" data-action="close-guide">我知道了</button>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
